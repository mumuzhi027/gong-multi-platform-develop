[versions]
agp = "8.6.0"
android-compileSdk = "36"
android-minSdk = "24"
android-targetSdk = "36"
androidx-activity = "1.9.3"
androidx-lifecycle = "2.9.4"
composeMultiplatform = "1.9.0"
core = "1.7.0"
glanceAppwidget = "1.1.1"
junitVersion = "1.1.5"
kotlin = "2.2.20"
