kotlinxSerializationJson = "1.9.0"
ktor = "3.3.0"
koin = "4.1.1"
multiplatformSettings = "1.3.0"
navigationCompose = "2.9.0"
room = "2.8.0"
roomTesting = "2.6.0"
sqlite = "2.6.0"
ksp = "2.2.10-2.0.2"
coroutinesTest = "1.10.2"
workRuntimeKtx = "2.10.5"

[libraries]
